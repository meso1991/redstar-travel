<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Results | RedStar Travel</title>
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body data-page="hotel_results">
    <header class="site-header">
        <div class="header-container">
            <a class="logo" href="index.html" aria-label="RedStar Travel home">
                <img src="assets/images/logo.svg" alt="RedStar Travel">
            </a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="about.html" data-i18n="nav_about">About</a>
                <a href="services.html" data-i18n="nav_services">Services</a>
                <a href="contact.html" class="nav-cta" data-i18n="nav_contact">Contact</a>
                <div class="lang-switcher">
                    <button class="lang-btn" type="button" data-lang="en">EN</button>
                    <button class="lang-btn" type="button" data-lang="ar">AR</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-hero" style="--page-hero-image: url('assets/images/hotel-search-bg.webp');">
            <div class="page-hero-content">
                <span class="eyebrow" id="hotelResultsEyebrow">Hotel Search</span>
                <h1 id="hotelResultsTitle">Compare hotel options from your booking partners.</h1>
                <p id="hotelResultsSubtitle">Use the links below to open the same search on Booking.com and Agoda.</p>
            </div>
        </section>

        <section class="section">
            <div class="container section-stack">
                <div class="detail-card" id="hotelSearchSummary"></div>
                <div class="cards-grid" id="hotelResultsGrid"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>&copy; <span data-current-year></span> <span data-i18n="footer_copy">RedStar Travel. Crafted for confident journeys.</span></p>
            <div class="footer-links">
                <a href="index.html" data-i18n="nav_home">Home</a>
                <a href="services.html" data-i18n="nav_services">Services</a>
                <a href="contact.html" data-i18n="nav_contact">Contact</a>
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/hotel-results.js"></script>
</body>
</html>
